name: Pull Request Title

on:
    workflow_dispatch:
    pull_request:
        types:
            - opened
            - edited
            - reopened
            - synchronize
            - ready_for_review

permissions:
    contents: read

jobs:
    pr-title-validation:
        if: github.event.pull_request.draft == false
        runs-on: ubuntu-latest
        permissions:
            pull-requests: read
        steps:
            - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  types: |
                      feat
                      fix
                      chore
                      docs
                      build
                      refactor
                      perf
                      test
                      ci
