name: Fondue CI

on:
  pull_request:
    paths:
      - packages/**
      - .npmrc
      - .nvmrc
      - package.json
      - pnpm-lock.yaml
      - pnpm-workspace.yaml

# Ensures that only one workflow per branch will run at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Fondue Icons
        run: pnpm build:icons

      - name: Build Fondue Charts
        run: pnpm build:charts

      - name: Build Fondue Components
        run: pnpm build:components

      - name: Build Fondue RTE
        run: pnpm build:rte

      - name: Build Fondue SDK
        run: pnpm build:sdk

      - name: Lint code
        run: pnpm --stream --filter {packages/fondue} --filter {packages/components} --filter {packages/icons} --filter {packages/rte} --filter {packages/sdk} lint

      - name: Typecheck code
        run: pnpm --stream --filter {packages/fondue} --filter {packages/components} --filter {packages/icons} --filter {packages/rte} --filter {packages/sdk} typecheck

  rte-component-tests:
    name: RTE Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          cypress-cache: "true"

      - name: Build Fondue Icons
        run: pnpm build:icons

      - name: Build Fondue Components
        run: pnpm build:components

      - name: Component Tests
        run: pnpm run --stream --filter {packages/rte} test

  component-unit-tests:
    name: Component Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Fondue icons
        run: pnpm build:icons

      - name: Unit test
        run: pnpm --stream --filter {packages/components} test

  component-tests:
    name: Component Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup
        with:
          playwright-cache: "true"

      - name: Build Fondue icons
        run: pnpm build:icons

      - name: Install Playwright browsers
        run: pnpm --stream --filter {packages/components} install:playwright

      - name: Playwright tests
        run: pnpm --filter {packages/components} run test:components:ci -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  sdk-tests:
    name: SDK Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup
        uses: ./.github/actions/setup

      - name: Unit test
        run: pnpm --stream --filter {packages/sdk} test
