name: Continuous Deployment

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Fondue Icons
        run: pnpm build:icons

      - name: Build Fondue Charts
        run: pnpm build:charts

      - name: Build Fondue Components
        run: pnpm build:components

      - name: Build Fondue RTE
        run: pnpm build:rte

      - name: Build Fondue SDK
        run: pnpm build:sdk

      - name: Lint code
        run: pnpm lint

      - name: Typecheck code
        run: pnpm typecheck

  rte-component-tests:
    name: RTE Component Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        uses: ./.github/actions/setup
        with:
          cypress-cache: "true"

      - name: Build Fondue Icons
        run: pnpm build:icons

      - name: Build Fondue Components
        run: pnpm build:components

      - name: Component Tests
        run: pnpm run --stream --filter {packages/rte} test

  component-unit-tests:
    name: Component Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Fondue icons
        run: pnpm build:icons

      - name: Unit test
        run: pnpm --stream --filter {packages/components} test

  component-tests:
    name: Component Tests (shard ${{ matrix.shard }}/${{ strategy.job-total }})
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4]

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Build Fondue icons
        run: pnpm build:icons

      - name: Install Playwright browsers
        run: pnpm --stream --filter {packages/components} install:playwright

      - name: Playwright tests
        run: pnpm --filter {packages/components} run test:components:ci -- --shard=${{ matrix.shard }}/${{ strategy.job-total }}

  publish:
    name: Publish
    runs-on: ubuntu-latest
    timeout-minutes: 10

    needs: [lint-typecheck, component-unit-tests, component-tests]

    permissions:
      contents: write # to create release (changesets/action)
      pull-requests: write # to create pull request (changesets/action)
      id-token: write # to authenticate with npm registry via OIDC

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Create release PR or publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          commit: "chore: release packages"
          title: "chore: release packages"
          createGithubReleases: true
          publish: pnpm release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
          # Use OIDC for npm authentication instead of NPM_TOKEN
          NPM_TOKEN: "" # https://github.com/changesets/changesets/issues/1152#issuecomment-3190884868
