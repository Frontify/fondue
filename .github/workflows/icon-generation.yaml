name: Update Icons

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * 1" # Run every Monday at midnight UTC

jobs:
  update-icons:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Use pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

      - name: Use Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm i --frozen-lockfile

      - name: Generate icons
        run: pnpm --stream --filter {packages/icons} build:download-new-icons
        env:
          FIGMA_ACCESS_TOKEN: ${{ secrets.FIGMA_ACCESS_TOKEN }}

      - name: Check for changes
        id: git-check
        run: |
          git add .
          git diff --staged --quiet || echo "changes=true" >> $GITHUB_OUTPUT

      - name: Create Unique Changeset
        if: steps.git-check.outputs.changes == 'true'
        id: create-changeset
        run: |
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          CHANGESET_FILE=".changeset/update-icons-${TIMESTAMP}.md"
          echo "---
          '@frontify/fondue-icons': minor
          ---

          feat: update icons" > "$CHANGESET_FILE"

      - name: Create Pull Request
        if: steps.git-check.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "feat: update icons"
          title: "feat: update icons"
          body: |
            This PR updates the icons using the latest changes.

            Auto-generated by GitHub Actions.
          branch: update-icons
          base: main
          team-reviewers: frontify/frontend-platform

      - name: No changes
        if: steps.git-check.outputs.changes != 'true'
        run: echo "No changes to commit. Skipping PR creation."
