name: Fondue Charts CI

on:
  pull_request:
    paths:
      - packages/charts/**

# Ensures that only one workflow per branch will run at a time.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Lint code
        run: pnpm --stream --filter {packages/charts} lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Typecheck code
        run: pnpm --stream --filter {packages/charts} typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Setup
        uses: ./.github/actions/setup

      - name: Unit tests
        run: pnpm --stream --filter {packages/charts} test
