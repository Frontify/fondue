name: Setup
description: Checkout, install pnpm + Node, restore caches, and install workspace dependencies.

inputs:
  cypress-cache:
    description: When 'true', also restore the Cypress binary cache.
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

    - name: Use pnpm
      uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      with:
        run_install: false

    - name: Use Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version-file: .nvmrc
        cache: pnpm

    - name: Cache Cypress binary
      if: inputs.cypress-cache == 'true'
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/Cypress
        key: cypress-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: cypress-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: pnpm i --frozen-lockfile
